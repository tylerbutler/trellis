[workspace]
# Changelog is managed by changie, not release-plz
changelog_update = false

# Disable GitHub release creation - cargo-dist handles this with binary assets
git_release_enable = false
# Enable git tag creation - this triggers cargo-dist release workflow
git_tag_enable = true
git_tag_name = "v{{ version }}"

# The crates.io name `trellis` is taken by an unrelated 2016 crate (see
# docs/DESIGN.md §11 on naming), so the crate publishes as `trellis-gleam`.
# Binaries still ship via cargo-dist; release-plz additionally runs
# `cargo publish` here when the release PR merges.
publish = true
