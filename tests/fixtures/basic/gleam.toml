# Workspace root: marked by the [tools.trellis] table. This file may also be
# a regular package manifest; here it is config-only.

[tools.trellis]
members = ["packages/*", "examples"]
exclude = { docs = ["examples"], hello = ["examples"], release = ["examples"] }

[tools.trellis.tasks.hello]
command = "echo hello-from-task"

[tools.trellis.publish]
tag-format = "{name}-v{version}"
retry = { attempts = 2, initial-delay = "10ms", multiplier = 2 }
